name: FinFeed Crawler

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      company_id:
        description: 'Company ID (비워두면 전체 크롤링)'
        required: false
        default: ''

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Build crawler
        run: mvn clean package -DskipTests -f crawler/pom.xml

      - name: Run crawler
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        run: |
          java -DDATABASE_URL="$DATABASE_URL" \
               -DDATABASE_USERNAME="$DATABASE_USERNAME" \
               -DDATABASE_PASSWORD="$DATABASE_PASSWORD" \
               -jar crawler/target/finfeed-crawler-*.jar
