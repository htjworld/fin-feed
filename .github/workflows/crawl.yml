name: Scheduled Crawl

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger crawl
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.BACKEND_URL }}/api/crawl" \
            -H "X-Crawler-Key: ${{ secrets.CRAWLER_API_KEY }}" \
            --max-time 300)
          echo "HTTP status: $response"
          if [ "$response" != "200" ]; then
            echo "Crawl failed with status $response"
            exit 1
          fi
